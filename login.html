<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Vidai to Mulai</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --red: #c0392b; --red-dark: #8b1a10; --green: #2d5a3d;
      --black: #111111; --charcoal: #2c2c2c; --stone: #8a8a8a;
      --light: #eeece6; --white: #f7f6f2;
      --font-display: 'Playfair Display', serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    body {
      font-family: var(--font-body);
      background: var(--black);
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    /* LEFT */
    .left {
      background: var(--black);
      padding: 64px 56px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-right: 1px solid rgba(255,255,255,0.06);
    }
    .brand { font-family: var(--font-display); font-size: 1.2rem; color: var(--white); }
    .brand span { color: var(--red); }
    .tagline { font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--red); margin-bottom: 20px; }
    .big-text { font-family: var(--font-display); font-size: 3rem; line-height: 1.1; color: var(--white); margin-bottom: 24px; }
    .big-text span { color: var(--red); }
    .desc { font-size: 13px; color: rgba(247,246,242,0.4); max-width: 340px; }
    .pipeline { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(247,246,242,0.2); }

    /* RIGHT */
    .right { background: var(--light); display: flex; align-items: center; justify-content: center; padding: 64px; }
    .login-box { width: 100%; max-width: 380px; }
    .login-title { font-family: var(--font-display); font-size: 1.8rem; color: var(--black); margin-bottom: 6px; }
    .login-sub { font-size: 12px; color: var(--stone); margin-bottom: 40px; }

    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--stone); margin-bottom: 6px; font-weight: 500; }
    input { width: 100%; padding: 11px 14px; background: var(--white); border: 1px solid #d0cec8; font-family: var(--font-body); font-size: 14px; color: var(--black); outline: none; }
    input:focus { border-color: var(--red); }

    .btn-google {
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 12px;
      padding: 12px 16px; background: var(--white); border: 1px solid #d0cec8;
      font-family: var(--font-body); font-size: 13px; font-weight: 500;
      color: var(--charcoal); cursor: pointer; margin-bottom: 20px; transition: border-color 0.2s;
    }
    .btn-google:hover { border-color: var(--charcoal); }

    .divider { display: flex; align-items: center; gap: 12px; margin: 28px 0; }
    .divider-line { flex: 1; height: 1px; background: #d0cec8; }
    .divider-text { font-size: 10px; letter-spacing: 0.12em; color: var(--stone); }

    .btn-signin {
      width: 100%; background: var(--red); color: var(--white); border: none;
      padding: 13px 24px; font-size: 12px; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; cursor: pointer; margin-top: 8px; transition: background 0.2s;
      font-family: var(--font-body);
    }
    .btn-signin:hover { background: var(--red-dark); }
    .btn-signin:disabled { opacity: 0.6; cursor: not-allowed; }

    .error {
      display: none; background: #fceee8; border-left: 3px solid var(--red);
      padding: 10px 14px; font-size: 12px; color: var(--red); margin-bottom: 20px;
      line-height: 1.5;
    }
    .error.visible { display: block; }

    .debug {
      display: none; background: #e8f5ee; border-left: 3px solid var(--green);
      padding: 10px 14px; font-size: 11px; color: var(--green);
      margin-bottom: 20px; font-family: var(--font-mono); line-height: 1.6;
    }
    .debug.visible { display: block; }

    @media (max-width: 768px) {
      body { grid-template-columns: 1fr; }
      .left { display: none; }
    }
  </style>
</head>
<body>

<div class="left">
  <div class="brand">Vidai <span>to</span> Mulai</div>
  <div>
    <div class="tagline">Gig Evaluation Platform</div>
    <div class="big-text">Lead.<br><span>Execute.</span><br>Evaluate.</div>
    <div class="desc">Track field and desk work packages from placement to reward.</div>
  </div>
  <div class="pipeline">Create → Assign → Approve → Deliver → Evaluate → Close</div>
</div>

<div class="right">
  <div class="login-box">
    <div class="login-title">Sign in</div>
    <div class="login-sub">Use Google or email to continue</div>

    <div class="error" id="errorMsg"></div>
    <div class="debug" id="debugMsg"></div>

    <button class="btn-google" id="googleBtn">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">or</div>
      <div class="divider-line"></div>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-signin" id="signinBtn">Sign In →</button>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

  const SUPABASE_URL = 'https://dbecwjhsewucqtfgoylv.supabase.co'
  const SUPABASE_KEY = 'sb_publishable_aw39P_0nn4vB0yjfDqwEvw_mU-Hc1Sp'

  const db = createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: {
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: true,
      storageKey: 'vtm-auth'
    }
  })

  const emailInput = document.getElementById('email')
  const passwordInput = document.getElementById('password')
  const signinBtn   = document.getElementById('signinBtn')
  const googleBtn   = document.getElementById('googleBtn')
  const errorDiv    = document.getElementById('errorMsg')
  const debugDiv    = document.getElementById('debugMsg')

  function showError(msg) {
    errorDiv.textContent = msg
    errorDiv.classList.add('visible')
    debugDiv.classList.remove('visible')
  }

  function showDebug(msg) {
    debugDiv.textContent = msg
    debugDiv.classList.add('visible')
  }

  function resetBtn() {
    signinBtn.disabled = false
    signinBtn.textContent = 'Sign In →'
  }

  // ── Show timeout message if redirected due to inactivity ────────────────
  const _reason = new URLSearchParams(window.location.search).get('reason')
  if (_reason === 'timeout') {
    const errDiv = document.getElementById('errorMsg')
    if (errDiv) {
      errDiv.textContent = 'You were signed out after 30 minutes of inactivity.'
      errDiv.classList.add('visible')
      errDiv.style.borderLeftColor = '#8a6200'
      errDiv.style.background = '#fdf5e0'
      errDiv.style.color = '#8a6200'
    }
  }

  // ── If already logged in, skip to index ─────────────────────────────────
  // Check if we're returning from OAuth — if so, let dashboard handle it
  const hash = window.location.hash
  const isOAuthReturn = hash && (hash.includes('access_token') || hash.includes('code'))
  
  if (!isOAuthReturn) {
    const { data: { session: existing } } = await db.auth.getSession()
    if (existing && sessionStorage.getItem('vtm_role')) {
      window.location.href = 'dashboard.html'
    }
  }

  // ── Email / password sign-in ─────────────────────────────────────────────
  async function signInWithEmail() {
    errorDiv.classList.remove('visible')
    debugDiv.classList.remove('visible')

    const email    = emailInput.value.trim()
    const password = passwordInput.value

    if (!email || !password) {
      showError('Please enter your email and password.')
      return
    }

    signinBtn.disabled = true
    signinBtn.textContent = 'Signing in…'

    // Step 1 — authenticate with Supabase Auth
    const { data: authData, error: authError } =
      await db.auth.signInWithPassword({ email, password })

    if (authError) {
      showError(authError.message.includes('Invalid')
        ? 'Incorrect email or password.'
        : authError.message)
      resetBtn()
      return
    }

    // Step 2 — look up vtm_users row
    const { data: vtmUser, error: vtmError } = await db
      .from('vtm_users')
      .select('user_id, name, role')
      .eq('auth_user_id', authData.user.id)
      .maybeSingle()

    if (vtmError) {
      showError(
        'Could not read user profile. ' +
        'Error: ' + vtmError.message
      )
      await db.auth.signOut()
      resetBtn()
      return
    }

    if (!vtmUser) {
      showError(
        'Authenticated but no user profile found. ' +
        'Ask your admin to add you to the vtm_users table with your auth ID: ' +
        authData.user.id
      )
      await db.auth.signOut()
      resetBtn()
      return
    }

    // Step 3 — store session and redirect
    sessionStorage.setItem('vtm_role',    vtmUser.role    || 'pacer')
    sessionStorage.setItem('vtm_name',    vtmUser.name    || email)
    sessionStorage.setItem('vtm_user_id', vtmUser.user_id || '')
    sessionStorage.setItem('vtm_email',   email)

    window.location.href = 'dashboard.html'
  }

  // ── Google OAuth ─────────────────────────────────────────────────────────
  async function signInWithGoogle() {
    errorDiv.classList.remove('visible')
    const { error } = await db.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + '/dashboard.html' }
    })
    if (error) showError(error.message)
  }

  // ── Event listeners ──────────────────────────────────────────────────────
  signinBtn.addEventListener('click', signInWithEmail)
  googleBtn.addEventListener('click', signInWithGoogle)
  passwordInput.addEventListener('keypress', e => {
    if (e.key === 'Enter') signInWithEmail()
  })
</script>
</body>
</html>
