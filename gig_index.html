<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gig Index — Vidai to Mulai</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/vtm.css">
  <script src="assets/vtm.js"></script>
  <script src="assets/vtm_auth_guard.js"></script>
  <style>
    .header-nav { display: flex; align-items: center; gap: 24px; }
    .header-nav a { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(247,246,242,0.45); text-decoration: none; transition: color 0.2s; }
    .header-nav a:hover { color: var(--white); }
    .header-nav a.active { color: var(--white); }
    .header-nav .nav-sep { color: rgba(247,246,242,0.2); font-size: 11px; }

    /* Flow strip */
    .flow-strip { background: var(--white); border-bottom: 2px solid var(--light); overflow-x: auto; }
    .flow-inner { display: flex; align-items: stretch; max-width: 1100px; margin: 0 auto; padding: 0 24px; }
    .flow-step { display: flex; align-items: center; flex: 1; min-width: 0; text-decoration: none; color: inherit; position: relative; }
    .flow-step-body { flex: 1; padding: 12px 16px; display: flex; flex-direction: column; gap: 2px; transition: background 0.15s; }
    .flow-step:hover .flow-step-body { background: var(--light); }
    .flow-step.active .flow-step-body { background: var(--light); }
    .flow-step-num { font-size: 9px; font-family: var(--font-mono); letter-spacing: 0.1em; color: var(--stone); }
    .flow-step-name { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--charcoal); white-space: nowrap; }
    .flow-step-status { font-size: 10px; color: var(--stone); font-weight: 300; }
    .flow-step::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: transparent; transition: background 0.15s; }
    .flow-step:hover::after { background: var(--stone); }
    .flow-step.active::after { background: var(--red); }
    .flow-step.active .flow-step-name { color: var(--red); }
    .flow-step.active .flow-step-num  { color: var(--red); }
    .flow-arrow { color: #ccc; font-size: 11px; padding: 0 2px; flex-shrink: 0; align-self: center; font-family: var(--font-mono); }

    .index-container { max-width: 1100px; margin: 0 auto; padding: 40px 24px 80px; }
    .register-card { background: white; padding: 32px 36px; border-top: 4px solid var(--charcoal); }
    .register-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 4px; }
    .register-title { font-family: var(--font-display); font-size: 1.4rem; color: var(--black); }
    .register-subtitle { font-size: 11px; color: var(--stone); font-family: var(--font-mono); margin-bottom: 20px; letter-spacing: 0.04em; }

    .btn-create { background: var(--red); color: white; border: none; padding: 9px 20px; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; font-family: var(--font-body); transition: background 0.2s; text-decoration: none; display: inline-block; }
    .btn-create:hover { background: var(--red-dark); }

    .db-status { font-size: 11px; font-family: var(--font-mono); padding: 4px 0 20px; color: var(--stone); letter-spacing: 0.04em; }
    .db-status.ok  { color: var(--green); }
    .db-status.err { color: var(--red); }

    .register-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .register-table thead tr { background: var(--black); color: var(--white); }
    .register-table th { padding: 10px 14px; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 500; text-align: left; }
    .register-table td { padding: 12px 14px; border-bottom: 1px solid var(--light); vertical-align: middle; color: var(--charcoal); }
    .register-table tr:hover td { background: var(--light); cursor: pointer; }

    .status-pill { display: inline-block; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 8px; font-weight: 600; }
    .status-pill.placed      { background: #e8eef5; color: #2a5a8a; }
    .status-pill.matched     { background: #f5eef8; color: #7b3fa0; }
    .status-pill.aligned     { background: #fdf5e0; color: #8a6200; }
    .status-pill.in_progress { background: #fceee8; color: var(--red); }
    .status-pill.delivered   { background: #e8f5ee; color: var(--green); }
    .status-pill.completed   { background: var(--light); color: var(--stone); }

    .tbl-btn { background: none; border: 1px solid #ccc; color: var(--mid); padding: 4px 10px; font-size: 11px; cursor: pointer; font-family: var(--font-body); letter-spacing: 0.06em; margin-right: 4px; transition: all 0.2s; }
    .tbl-btn:hover { border-color: var(--charcoal); color: var(--black); }
    .tbl-btn.danger:hover { border-color: var(--red); color: var(--red); }

    .cat-tag { display: inline-block; font-size: 10px; font-family: var(--font-mono); color: var(--stone); background: var(--light); padding: 1px 7px; }

    .empty-state { text-align: center; padding: 48px 0; color: var(--stone); font-size: 13px; }
    .empty-state a { color: var(--red); text-decoration: none; }

    .placement-flag { font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; color: #8a6200; background: #fdf5e0; padding: 2px 6px; font-family: var(--font-mono); }
  </style>
</head>
<body>

<header>
  <div class="header-brand">Vidai <span>to</span> Mulai</div>
  <nav class="header-nav">
    <a href="index.html">← Home</a>
    <span class="nav-sep">|</span>
    <a href="gig_index.html" class="active">Gig Index</a>
    <span class="nav-sep">|</span>
    <a href="project_index.html">Projects</a>
    <span class="nav-sep">|</span>
    <a href="create_gig.html" id="newGigLink">+ New Gig</a>
  </nav>
</header>

<!-- Pipeline flow strip -->
<div class="flow-strip">
  <div class="flow-inner">
    <a class="flow-step" data-status="placed" href="gig_index.html?status=placed">
      <div class="flow-step-body">
        <div class="flow-step-num">01</div>
        <div class="flow-step-name">Create</div>
        <div class="flow-step-status">Placed</div>
      </div>
    </a>
    <div class="flow-arrow">›</div>
    <a class="flow-step" data-status="matched" href="gig_index.html?status=matched">
      <div class="flow-step-body">
        <div class="flow-step-num">02</div>
        <div class="flow-step-name">Assign</div>
        <div class="flow-step-status">Matched</div>
      </div>
    </a>
    <div class="flow-arrow">›</div>
    <a class="flow-step" data-status="aligned" href="gig_index.html?status=aligned">
      <div class="flow-step-body">
        <div class="flow-step-num">03</div>
        <div class="flow-step-name">Approve</div>
        <div class="flow-step-status">Aligned</div>
      </div>
    </a>
    <div class="flow-arrow">›</div>
    <a class="flow-step" data-status="in_progress" href="gig_index.html?status=in_progress">
      <div class="flow-step-body">
        <div class="flow-step-num">04</div>
        <div class="flow-step-name">Deliver</div>
        <div class="flow-step-status">In Progress</div>
      </div>
    </a>
    <div class="flow-arrow">›</div>
    <a class="flow-step" data-status="delivered" href="gig_index.html?status=delivered">
      <div class="flow-step-body">
        <div class="flow-step-num">05</div>
        <div class="flow-step-name">Evaluate</div>
        <div class="flow-step-status">Delivered</div>
      </div>
    </a>
    <div class="flow-arrow">›</div>
    <a class="flow-step" data-status="completed" href="gig_index.html?status=completed">
      <div class="flow-step-body">
        <div class="flow-step-num">06</div>
        <div class="flow-step-name">Close</div>
        <div class="flow-step-status">Completed</div>
      </div>
    </a>
  </div>
</div>

<main class="index-container">
  <div class="register-card">
    <div class="register-header">
      <div class="register-title" id="registerTitle">Gig Register</div>
      <a href="create_gig.html" class="btn-create" id="newGigBtn">+ New Gig</a>
    </div>
    <div class="register-subtitle" id="registerSubtitle">All gigs</div>
    <div class="db-status" id="dbStatus">Connecting…</div>
    <table class="register-table">
      <thead>
        <tr>
          <th>Code</th>
          <th>Title</th>
          <th>Project</th>
          <th>Category</th>
          <th>Status</th>
          <th>Start</th>
          <th>Due</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="gigTableBody">
        <tr><td colspan="8"><div class="empty-state">Loading…</div></td></tr>
      </tbody>
    </table>
  </div>
</main>

<script type="module" src="assets/gig_index.js"></script>
</body>
</html>
