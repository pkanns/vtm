<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

  const SUPABASE_URL = 'https://dbecwjhsewucqtfgoylv.supabase.co'
  const SUPABASE_KEY = 'sb_publishable_aw39P_0nn4vB0yjfDqwEvw_mU-Hc1Sp'
  const db = createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true, storageKey: 'vtm-auth' }
  })

  // ── Auth check — redirect to login if no session ──────────────────────
  const { data: { session } } = await db.auth.getSession()

  if (!session) {
    window.location.href = 'login.html'
  }

  // ── Get or refresh vtm_users data and populate sessionStorage ─────────
  const { data: vtmUser, error: vtmError } = await db
    .from('vtm_users')
    .select('user_id, name, role')
    .eq('auth_user_id', session.user.id)
    .maybeSingle()

  if (vtmError || !vtmUser) {
    // No profile found — sign out and show error
    console.error('No vtm_user profile:', vtmError)
    await db.auth.signOut()
    sessionStorage.clear()
    alert('User profile not found. Please contact your administrator.')
    window.location.href = 'login.html'
  } else {
    // Populate sessionStorage
    sessionStorage.setItem('vtm_role',    vtmUser.role)
    sessionStorage.setItem('vtm_name',    vtmUser.name)
    sessionStorage.setItem('vtm_user_id', vtmUser.user_id)
    sessionStorage.setItem('vtm_email',   session.user.email || '')
    
    // Show user's name
    const displayName = vtmUser.name || session.user.user_metadata?.full_name || session.user.email || 'User'
    document.getElementById('coverName').textContent = displayName

    // Show Create User card only for admins
    if (vtmUser.role === 'admin') {
      const card = document.getElementById('cardCreateUser')
      if (card) card.classList.remove('hidden')
    }
  }

  // ── Sign out ───────────────────────────────────────────────────────────
  window.signOut = async function() {
    await db.auth.signOut()
    sessionStorage.clear()
    window.location.href = 'login.html'
  }
</script>
