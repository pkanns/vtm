<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Gig — Vidai to Mulai</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/vtm.css">
  <script src="assets/vtm.js"></script>
  <script src="assets/vtm_auth_guard.js"></script>
  <style>
    .header-nav { display: flex; align-items: center; gap: 24px; }
    .header-nav a { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(247,246,242,0.45); text-decoration: none; transition: color 0.2s; }
    .header-nav a:hover { color: var(--white); }
    .header-nav a.active { color: var(--white); }
    .header-nav .nav-sep { color: rgba(247,246,242,0.2); font-size: 11px; }

    .form-container { max-width: 900px; margin: 0 auto; padding: 40px 24px 80px; }

    .form-card { background: white; padding: 32px 36px; margin-bottom: 24px; border-top: 4px solid var(--red); }
    .form-title { font-family: var(--font-display); font-size: 1.5rem; margin-bottom: 4px; color: var(--black); }
    .form-subtitle { font-size: 11px; color: var(--stone); font-family: var(--font-mono); margin-bottom: 28px; letter-spacing: 0.04em; }

    .form-row { margin-bottom: 20px; }
    .form-row label { display: block; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--stone); margin-bottom: 6px; font-weight: 500; }
    .form-row input, .form-row select, .form-row textarea { width: 100%; padding: 10px 12px; background: var(--light); border: none; border-bottom: 1px solid #ccc; font-family: var(--font-body); font-size: 14px; color: var(--black); outline: none; transition: border-color 0.2s; }
    .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-bottom-color: var(--red); }
    .form-row input:disabled, .form-row select:disabled { opacity: 0.55; cursor: not-allowed; }

    .two-columns   { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .three-columns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }

    /* Gig code preview bar */
    .code-preview-row { display: flex; align-items: center; gap: 0; margin-bottom: 20px; background: var(--black); padding: 14px 16px; }
    .code-preview-label { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(247,246,242,0.35); font-family: var(--font-mono); margin-right: 16px; white-space: nowrap; }
    .code-preview-value { font-family: var(--font-mono); font-size: 1.1rem; color: var(--red); font-weight: 600; letter-spacing: 0.06em; }
    .code-preview-value.dim { color: rgba(247,246,242,0.25); font-size: 0.95rem; }
    .code-preview-hint { font-size: 10px; color: rgba(247,246,242,0.3); font-family: var(--font-mono); margin-left: 16px; }

    /* Cadence toggle — full width, same pair style */
    .cadence-toggle-wrap { margin-bottom: 20px; }
    .cadence-toggle-wrap .toggle-pair { width: 100%; }
    .cadence-toggle-wrap .toggle-pair label { padding: 11px 12px; font-size: 13px; }

    /* Recurring block */
    #recurringBlock { display: none; background: var(--light); border-left: 3px solid var(--red); padding: 20px 20px 4px; margin-bottom: 20px; }
    #recurringBlock.visible { display: block; }
    .recurring-block-label { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--red); font-weight: 500; margin-bottom: 16px; }
    #recurringBlock .form-row input,
    #recurringBlock .form-row select { background: var(--white); }
    .stop-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .stop-row input[type="checkbox"] { width: 15px; height: 15px; accent-color: var(--red); cursor: pointer; flex-shrink: 0; }
    .stop-row label { font-size: 12px; color: var(--mid); cursor: pointer; }

    /* Status row — edit mode only */
    #statusRow { display: none; }

    /* Budget */
    #budgetBlock { display: none; }
    #budgetBlock.visible { display: block; }

    /* Edit banner */
    .edit-banner { display: none; background: var(--light); border-left: 3px solid var(--charcoal); padding: 10px 16px; font-size: 12px; color: var(--mid); margin-bottom: 20px; }
    .edit-banner.visible { display: block; }

    /* Action buttons */
    .action-buttons { display: flex; gap: 16px; justify-content: flex-end; margin-top: 32px; align-items: center; }
    .btn-primary { background: var(--red); color: white; border: none; padding: 12px 28px; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: background 0.2s, transform 0.15s; font-family: var(--font-body); }
    .btn-primary:hover { background: var(--red-dark); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-secondary { background: transparent; color: var(--stone); border: 1px solid #ccc; padding: 12px 28px; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; font-family: var(--font-body); transition: all 0.2s; }
    .btn-secondary:hover { border-color: var(--charcoal); color: var(--black); }
  </style>
</head>
<body>

<header>
  <div class="header-brand">Vidai <span>to</span> Mulai</div>
  <nav class="header-nav">
    <a href="index.html">← Home</a>
    <span class="nav-sep">|</span>
    <a href="project_index.html">Projects</a>
    <span class="nav-sep">|</span>
    <a href="create_gig.html" class="active">New Gig</a>
  </nav>
</header>

<main class="form-container">
  <div class="form-card">
    <div class="form-title" id="formTitle">New Gig</div>
    <div class="form-subtitle" id="formSubtitle">Create a new work package</div>
    <div class="edit-banner" id="editBanner">Editing existing gig — save to update.</div>
    <input type="hidden" id="editingGigId">

    <!-- Project + Category -->
    <div class="two-columns">
      <div class="form-row">
        <label>Project *</label>
        <select id="gigProject" onchange="onProjectChange()">
          <option value="">— Loading —</option>
        </select>
      </div>
      <div class="form-row">
        <label>Category *</label>
        <select id="gigCategory" onchange="onCategoryChange()" disabled>
          <option value="">— Select Project first —</option>
        </select>
      </div>
    </div>

    <!-- Gig code preview -->
    <div class="code-preview-row">
      <div class="code-preview-label">Gig Code</div>
      <div class="code-preview-value dim" id="gigCodeDisplay">— select project &amp; category</div>
      <div class="code-preview-hint" id="gigCodeHint"></div>
    </div>

    <!-- Gig title -->
    <div class="form-row">
      <label>Gig Title *</label>
      <input type="text" id="gigName" placeholder="Short descriptive title">
    </div>

  </div><!-- end form-card -->

  <!-- Gig Classification — 4 symmetric toggles matching gig_eval style -->
  <div class="gig-toggles">
    <div class="toggles-label">Gig Classification</div>
    <div class="toggles-grid">

      <div class="toggle-group">
        <div class="toggle-group-label">Cadence</div>
        <div class="toggle-pair">
          <input type="radio" name="tog-cadence" id="tog-oneoff" value="oneoff" checked onchange="onCadenceChange()">
          <label for="tog-oneoff">One-off</label>
          <input type="radio" name="tog-cadence" id="tog-recurring" value="recurring" onchange="onCadenceChange()">
          <label for="tog-recurring">Recurring</label>
        </div>
      </div>

      <div class="toggle-group">
        <div class="toggle-group-label">Scale</div>
        <div class="toggle-pair">
          <input type="radio" name="tog-scale" id="tog-minor" value="minor" checked>
          <label for="tog-minor">Minor</label>
          <input type="radio" name="tog-scale" id="tog-major" value="major">
          <label for="tog-major">Major</label>
        </div>
      </div>

      <div class="toggle-group">
        <div class="toggle-group-label">Setting</div>
        <div class="toggle-pair">
          <input type="radio" name="tog-setting" id="tog-field" value="field" checked onchange="onSettingChange();toggleBudgetBlock()">
          <label for="tog-field">Field</label>
          <input type="radio" name="tog-setting" id="tog-desk" value="desk" onchange="onSettingChange();toggleBudgetBlock()">
          <label for="tog-desk">Desk</label>
        </div>
      </div>

      <div class="toggle-group">
        <div class="toggle-group-label">Skill Level</div>
        <div class="toggle-pair">
          <input type="radio" name="tog-skill" id="tog-unskilled" value="unskilled" checked>
          <label for="tog-unskilled">Unskilled</label>
          <input type="radio" name="tog-skill" id="tog-skilled" value="skilled">
          <label for="tog-skilled">Skilled</label>
        </div>
      </div>

    </div>

    <!-- Recurring config block — appears below grid when Recurring selected -->
    <div id="recurringBlock">
      <div class="recurring-block-label" style="margin-top:20px;">Recurrence Configuration</div>
      <div class="two-columns">
        <div class="form-row">
          <label>Frequency *</label>
          <select id="recurFrequency">
            <option value="">— Select Frequency —</option>
            <option value="weekly">Weekly</option>
            <option value="fortnightly">Fortnightly</option>
            <option value="monthly">Monthly</option>
          </select>
        </div>
        <div class="form-row">
          <label>End Date</label>
          <input type="date" id="recurEndDate">
        </div>
      </div>
      <div class="stop-row">
        <input type="checkbox" id="recurStopped">
        <label for="recurStopped">Stop recurrence — no new instances will be created after saving</label>
      </div>
    </div>

  </div>

  <!-- Second form card — Assignment, Dates, Description, Budget, Notes -->
  <div class="form-card" style="border-top-color:var(--charcoal);">

    <!-- Assignment + Dates -->
    <div class="two-columns" style="margin-top:24px;">
      <div class="form-row">
        <label>Lead (Pacer) *</label>
        <select id="gigPacer"><option value="">— Loading —</option></select>
      </div>
      <div class="form-row">
        <label>Doer (Rover) *</label>
        <select id="gigRover"><option value="">— Loading —</option></select>
      </div>
    </div>

    <div class="three-columns">
      <div class="form-row"><label>Date Placed</label><input type="date" id="gigDatePlaced"></div>
      <div class="form-row"><label>Date Start</label><input type="date" id="gigDateStart"></div>
      <div class="form-row"><label>Date Due</label><input type="date" id="gigDateDue"></div>
    </div>

    <!-- Status — edit mode only -->
    <div class="form-row" id="statusRow">
      <label>Status</label>
      <select id="gigStatus">
        <option value="placed">Placed</option>
        <option value="matched">Matched</option>
        <option value="aligned">Aligned</option>
        <option value="in_progress">In Progress</option>
        <option value="delivered">Delivered</option>
        <option value="completed">Completed</option>
      </select>
    </div>

    <div class="form-row">
      <label>Description</label>
      <textarea id="gigDesc" rows="3" placeholder="Scope of this gig…"></textarea>
    </div>

    <!-- Budget — field gigs only -->
    <div id="budgetBlock">
      <div style="margin-top:8px;margin-bottom:16px;">
        <div class="toggles-label">Budget Items</div>
      </div>
      <table class="budget-table">
        <thead><tr><th>Description</th><th>Estimated (₹)</th><th>Notes</th><th></th></tr></thead>
        <tbody id="budget-body"></tbody>
        <tfoot>
          <tr class="budget-total-row">
            <td><strong>Total</strong></td>
            <td id="budget-total">₹ 0</td>
            <td></td><td></td>
          </tr>
        </tfoot>
      </table>
      <button type="button" class="add-row-btn" onclick="addBudgetRow()">+ Add Budget Item</button>
    </div>

    <div class="form-row" style="margin-top:24px;">
      <label>Internal Notes</label>
      <textarea id="gigNotes" rows="2"></textarea>
    </div>

    <div class="action-buttons">
      <button type="button" class="btn-secondary" onclick="cancelEdit()">Cancel</button>
      <button type="button" class="btn-primary" id="saveBtn" onclick="saveGigForm()">Save Gig →</button>
    </div>
  </div><!-- end second form-card -->
</main>

<script type="module" src="assets/create_gig.js"></script>
</body>
</html>
